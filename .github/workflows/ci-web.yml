name: ci-web

# Runs only when the Next.js app or root tooling changes.
# Once apps/web/ is scaffolded, the path filter below activates the
# real typecheck/lint pipeline.

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-web.yml"
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-web.yml"

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Skip if web app not yet scaffolded
        id: skip-check
        run: |
          if [ ! -f apps/web/package.json ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "apps/web is not yet scaffolded, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.skip-check.outputs.skip == 'false'
        run: npm ci

      - name: Run tsc
        if: steps.skip-check.outputs.skip == 'false'
        run: npm run typecheck --workspace=web

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Skip if web app not yet scaffolded
        id: skip-check
        run: |
          if [ ! -f apps/web/package.json ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.skip-check.outputs.skip == 'false'
        run: npm ci

      - name: Run ESLint
        if: steps.skip-check.outputs.skip == 'false'
        run: npm run lint --workspace=web
