version: 2
updates:
  # GitHub Actions used by CI workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Lisbon"
    open-pull-requests-limit: 5
    labels:
      - "ci"
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"

  # Root tooling (husky, commitlint)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Lisbon"
    open-pull-requests-limit: 5
    labels:
      - "tooling"
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    groups:
      tooling-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
