name: Feature request
description: Suggest a new capability or enhancement
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem or limitation are you trying to address?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have thought about.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which area does this affect?
      options:
        - Frontend (Next.js / UI)
        - Backend (API / Server Actions)
        - Database (schema / RLS)
        - Auth
        - Billing (Stripe)
        - Infra (Vercel / Supabase config)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, related issues, anything else.
    validations:
      required: false
